<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - A&I Tech & Trade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">A&I Tech & Trade</div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="support.html">Support</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="contact-page">
        <h2>Contact Us</h2>
        <p>Have questions, feedback, or just want to say hello? We'd love to hear from you!</p> 
        <div class="contact-form">
            <h3>Send us a message</h3>
            <form id="contact-form" data-netlify="true"> 
                <input type="text" name="name" placeholder="Your Name" required> 
                <input type="email" name="email" placeholder="Your Email" required> 
                <input type="text" name="subject" placeholder="Subject" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit" class="btn">Send</button>
            </form>
        </div>
    </section>
    <footer>
        <p>&copy; 2025 A & I Tech & Trade. All rights reserved.</p>
    </footer>
</body>
</html>
